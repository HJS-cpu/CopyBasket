name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build CopyBasket x64
        run: msbuild CopyBasket.sln /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Build CopyBasket x86
        run: msbuild CopyBasket.sln /p:Configuration=Release /p:Platform=Win32 /verbosity:minimal

      - name: Build CB-CMT (regsvr Tool)
        run: msbuild "regsvr Tool\CopyBasketContextMenu.sln" /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Path "CopyBasket" -Force
          Copy-Item "x64\Release\CopyBasket.dll" "CopyBasket\CopyBasket_x64.dll"
          Copy-Item "Release\CopyBasket.dll" "CopyBasket\CopyBasket_x86.dll"
          Copy-Item "regsvr Tool\bin\Release\CB-CMT.exe" "CopyBasket\CB-CMT.exe"
          Compress-Archive -Path "CopyBasket\*" -DestinationPath "CopyBasket_${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: CopyBasket_${{ github.ref_name }}.zip
