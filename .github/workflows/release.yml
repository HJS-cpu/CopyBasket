name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build CopyBasket x64
        run: msbuild CopyBasket.sln /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Build CopyBasket x86
        run: msbuild CopyBasket.sln /p:Configuration=Release /p:Platform=Win32 /verbosity:minimal

      - name: Build CB-CMT (regsvr Tool)
        run: msbuild "regsvr Tool\CopyBasketContextMenu.sln" /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Install NSIS
        run: choco install nsis -y
        shell: cmd

      - name: Build Installer
        shell: cmd
        run: |
          mkdir build
          cd installer
          "%ProgramFiles(x86)%\NSIS\makensis.exe" CopyBasket.nsi
          cd ..
          dir build\CopyBasket-*-setup.exe

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Path "_release" -Force
          Copy-Item "x64\Release\CopyBasket.dll" "_release\CopyBasket_x64.dll"
          Copy-Item "Release\CopyBasket.dll" "_release\CopyBasket_x86.dll"
          Copy-Item "regsvr Tool\bin\Release\CB-CMT.exe" "_release\CB-CMT.exe"
          Compress-Archive -Path "_release\*" -DestinationPath "CopyBasket_${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CopyBasket_${{ github.ref_name }}.zip
            build/CopyBasket-*-setup.exe
