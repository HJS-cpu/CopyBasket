name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build CopyBasket x64
        run: msbuild CopyBasket.sln /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Build CopyBasket x86
        run: msbuild CopyBasket.sln /p:Configuration=Release /p:Platform=Win32 /verbosity:minimal

      - name: Build CB-CMT (regsvr Tool)
        run: msbuild "regsvr Tool\CopyBasketContextMenu.sln" /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Build Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build -Force | Out-Null

          # Look for a pre-installed NSIS first (windows-latest ships with it)
          $candidates = @(
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
            "${env:ProgramFiles}\NSIS\makensis.exe",
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )
          $makensis = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          # Also try PATH as a final attempt
          if (-not $makensis) {
            $cmd = Get-Command makensis.exe -ErrorAction SilentlyContinue
            if ($cmd) { $makensis = $cmd.Source }
          }

          # Last-resort fallback: download NSIS portable archive
          if (-not $makensis) {
            Write-Host "NSIS not found locally — downloading portable archive..."
            $url = "https://downloads.sourceforge.net/project/nsis/NSIS%203/3.10/nsis-3.10.zip"
            Invoke-WebRequest -Uri $url -OutFile nsis.zip -UseBasicParsing
            Expand-Archive -Path nsis.zip -DestinationPath nsis-dist -Force
            $makensis = (Get-ChildItem -Path nsis-dist -Recurse -Filter makensis.exe | Select-Object -First 1).FullName
          }

          if (-not $makensis) {
            throw "makensis.exe could not be located or installed."
          }

          Write-Host "Using NSIS at: $makensis"
          Push-Location installer
          & $makensis CopyBasket.nsi
          if ($LASTEXITCODE -ne 0) { throw "NSIS build failed with exit code $LASTEXITCODE" }
          Pop-Location

          Get-ChildItem build\CopyBasket-*-setup.exe

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Path "_release" -Force
          Copy-Item "x64\Release\CopyBasket.dll" "_release\CopyBasket_x64.dll"
          Copy-Item "Release\CopyBasket.dll" "_release\CopyBasket_x86.dll"
          Copy-Item "regsvr Tool\bin\Release\CB-CMT.exe" "_release\CB-CMT.exe"
          Compress-Archive -Path "_release\*" -DestinationPath "CopyBasket_${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CopyBasket_${{ github.ref_name }}.zip
            build/CopyBasket-*-setup.exe
