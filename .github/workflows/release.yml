name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build CopyBasket x64
        run: msbuild CopyBasket.sln /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Build CopyBasket x86
        run: msbuild CopyBasket.sln /p:Configuration=Release /p:Platform=Win32 /verbosity:minimal

      - name: Build CB-CMT (regsvr Tool)
        run: msbuild "regsvr Tool\CopyBasketContextMenu.sln" /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Install NSIS via scoop
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host "Installing scoop..."
          Invoke-Expression "& { $(Invoke-RestMethod get.scoop.sh) } -RunAsAdmin"

          # Add scoop shims to PATH for this session
          $env:PATH = "$env:USERPROFILE\scoop\shims;$env:PATH"

          Write-Host "Installing NSIS..."
          scoop install nsis

          $makensis = "$env:USERPROFILE\scoop\apps\nsis\current\makensis.exe"
          if (-not (Test-Path $makensis)) {
            throw "NSIS installation failed — $makensis not found"
          }
          Write-Host "NSIS ready at: $makensis"
          "NSIS_PATH=$makensis" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build -Force | Out-Null
          Push-Location installer
          & "$env:NSIS_PATH" CopyBasket.nsi
          if ($LASTEXITCODE -ne 0) { throw "NSIS build failed with exit code $LASTEXITCODE" }
          Pop-Location
          Get-ChildItem build\CopyBasket-*-setup.exe

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Path "_release" -Force
          Copy-Item "x64\Release\CopyBasket.dll" "_release\CopyBasket_x64.dll"
          Copy-Item "Release\CopyBasket.dll" "_release\CopyBasket_x86.dll"
          Copy-Item "regsvr Tool\bin\Release\CB-CMT.exe" "_release\CB-CMT.exe"
          Compress-Archive -Path "_release\*" -DestinationPath "CopyBasket_${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CopyBasket_${{ github.ref_name }}.zip
            build/CopyBasket-*-setup.exe
